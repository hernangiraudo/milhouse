[dependencies.chrono]
version = "0.4.38"
features = [
    "clock",
    "wasmbind",
    "serde",
]
optional = true
default-features = false

[dependencies.js-sys]
version = "0.3.69"
optional = true

[dependencies.polars]
version = "0.43"
features = []
optional = true
default-features = false

[dependencies.rust_xlsxwriter_derive]
version = "0.2.0"
optional = true

[dependencies.ryu]
version = "1.0.18"
optional = true

[dependencies.serde]
version = "1.0.203"
features = ["derive"]
optional = true

[dependencies.tempfile]
version = "3.12.0"
optional = true

[dependencies.wasm-bindgen]
version = "0.2.92"
optional = true

[dependencies.zip]
version = "2.2.0"
features = ["deflate"]
default-features = false

[dev-dependencies.pretty_assertions]
version = "1.4.0"

[dev-dependencies.regex]
version = "1.10.5"

[features]
chrono = ["dep:chrono"]
constant_memory = ["dep:tempfile"]
default = []
polars = ["dep:polars"]
ryu = ["dep:ryu"]
serde = [
    "dep:serde",
    "dep:rust_xlsxwriter_derive",
]
test-resave = []
wasm = [
    "js-sys",
    "wasm-bindgen",
]
zlib = ["zip/deflate-zlib"]
